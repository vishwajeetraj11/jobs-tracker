# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # [CUSTOMIZE] Add keywords matching YOUR target roles
    # -- Frontend roles --
    - "Frontend"
    - "Front-end"
    - "Front End"
    - "React"
    - "Next.js"
    - "Next"
    - "Svelte"
    - "SvelteKit"
    - "UI Engineer"
    - "UI Developer"
    - "Web Engineer"
    - "Web Developer"
    - "JavaScript Engineer"
    - "TypeScript Engineer"
    # -- Full Stack roles --
    - "Full Stack"
    - "Fullstack"
    - "Full-Stack"
    # -- Web3/DeFi roles --
    - "Web3"
    - "DeFi"
    - "Blockchain"
    - "Crypto"
    - "dApp"
    - "Ethereum"
    - "Solidity"
    - "On-chain"
    # -- Engineering generalist --
    - "Software Engineer"
    - "Software Developer"
  negative:
    # [CUSTOMIZE] Add keywords for roles you want to exclude
    - "Junior"
    - "Intern"
    - ".NET"
    - "Java "
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Salesforce Admin"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
    - "Backend"
    - "DevOps"
    - "Data Engineer"
    - "Data Scientist"
    - "Machine Learning"
  seniority_boost:
    # These prefixes add relevance but are not required
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.

search_queries:
  # -- Ashby --
  - name: Ashby — Senior Frontend
    query: 'site:jobs.ashbyhq.com "Senior Frontend Engineer" OR "Staff Frontend Engineer" OR "Frontend Developer" remote'
    enabled: true

  - name: Ashby — React / Next.js
    query: 'site:jobs.ashbyhq.com "React" OR "Next.js" "Engineer" OR "Developer" senior remote'
    enabled: true

  - name: Ashby — Full Stack
    query: 'site:jobs.ashbyhq.com "Senior Full Stack" OR "Fullstack Engineer" OR "Full-Stack" React OR Next.js remote'
    enabled: true

  - name: Ashby — Web3 / DeFi
    query: 'site:jobs.ashbyhq.com "Web3" OR "DeFi" OR "Blockchain" "Frontend" OR "Engineer" OR "Developer"'
    enabled: true

  # -- Greenhouse --
  - name: Greenhouse — Senior Frontend
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Senior Frontend Engineer" OR "Staff Frontend" OR "Frontend Developer" remote'
    enabled: true

  - name: Greenhouse — React / Next.js
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "React" OR "Next.js" "Engineer" senior remote'
    enabled: true

  - name: Greenhouse — Full Stack
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Senior Full Stack" OR "Fullstack" React OR TypeScript remote'
    enabled: true

  # -- Lever --
  - name: Lever — Frontend
    query: 'site:jobs.lever.co "Senior Frontend Engineer" OR "Frontend Developer" OR "React Engineer" remote'
    enabled: true

  - name: Lever — Full Stack
    query: 'site:jobs.lever.co "Full Stack Engineer" OR "Fullstack" React OR Next.js remote'
    enabled: true

  # -- Wellfound (startups) --
  - name: Wellfound — Frontend
    query: 'site:wellfound.com "Senior Frontend Engineer" OR "React Developer" OR "Next.js" remote'
    enabled: true

  # -- Workable --
  - name: Workable — Frontend
    query: 'site:apply.workable.com "Frontend Engineer" OR "React" OR "Full Stack" senior remote'
    enabled: true

  # -- Web3 / DeFi specific --
  - name: Web3 — Frontend (cross-portal)
    query: '"Web3 Frontend" OR "DeFi Frontend" OR "Blockchain Frontend" OR "Solidity" "Frontend" remote'
    enabled: true

  - name: Crypto — Frontend Engineer
    query: '"Frontend Engineer" OR "React Engineer" crypto OR web3 OR defi OR "on-chain" remote senior'
    enabled: true

  # -- SvelteKit / Svelte --
  - name: Svelte — All portals
    query: '"Svelte" OR "SvelteKit" "Engineer" OR "Developer" remote'
    enabled: true

  # -- UI / Design Systems --
  - name: UI Engineer — All portals
    query: '"UI Engineer" OR "Design Systems Engineer" OR "Frontend Platform" React OR TypeScript remote senior'
    enabled: true

  # -- RemoteFront (aggregator) --
  - name: RemoteFront — Frontend
    query: 'site:remotefront.com "Frontend Engineer" OR "React" OR "Next.js" OR "Full Stack" remote senior'
    enabled: true

  # -- India job boards --

  - name: Naukri — Senior Frontend
    query: 'site:naukri.com "Senior Frontend Engineer" OR "Senior Frontend Developer" React OR Next.js Bangalore OR Delhi OR "Delhi NCR" OR Pune OR Maharashtra OR "Remote"'
    enabled: true

  - name: Naukri — Full Stack
    query: 'site:naukri.com "Senior Full Stack" OR "Full Stack Engineer" React OR Next.js TypeScript Bangalore OR Delhi OR "Delhi NCR" OR Pune OR Maharashtra OR Remote'
    enabled: true

  - name: Naukri — Web3 / DeFi
    query: 'site:naukri.com "Web3" OR "DeFi" OR "Blockchain" "Frontend" OR "React" Bangalore OR Delhi OR "Delhi NCR" OR Pune OR Maharashtra OR Remote'
    enabled: true

  - name: Cutshort — Frontend
    query: 'site:cutshort.io "Senior Frontend" OR "React Engineer" OR "Next.js" Bangalore OR Delhi OR "Delhi NCR" OR Pune OR Maharashtra OR Remote'
    enabled: true

  - name: Cutshort — Web3
    query: 'site:cutshort.io "Web3" OR "DeFi" OR "Blockchain" "Frontend" OR "React" India OR Bangalore OR Delhi OR "Delhi NCR" OR Pune OR Maharashtra OR Remote'
    enabled: true

  - name: Instahyre — Senior Frontend
    query: 'site:instahyre.com "Senior Frontend Engineer" OR "React" OR "Next.js" Bangalore OR Delhi OR "Delhi NCR" OR Pune OR Maharashtra OR Remote'
    enabled: true

  - name: Wellfound — India Frontend
    query: 'site:wellfound.com "Frontend Engineer" OR "React" OR "Full Stack" India OR Bangalore OR Delhi OR "Delhi NCR" OR Pune OR Maharashtra OR Remote'
    enabled: true

  - name: LinkedIn — India Senior Frontend
    query: 'site:linkedin.com/jobs "Senior Frontend Engineer" OR "Senior React Developer" India OR Bangalore OR Delhi OR "Delhi NCR" OR Pune OR Maharashtra OR Remote'
    enabled: true

  - name: LinkedIn — India Web3
    query: 'site:linkedin.com/jobs "Web3" OR "DeFi" OR "Blockchain" "Frontend" OR "React" India OR Bangalore OR Delhi OR "Delhi NCR" OR Pune OR Maharashtra'
    enabled: true

